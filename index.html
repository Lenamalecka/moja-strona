<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Dark Mode</title>
  <style>
  body {
    background: white;
    color: black;
    transition: 0.3s;
  }
  .dark {
    background: #111;
    color: white;
  }
  button {
    padding: 10px 20px;
    margin: 20px;
  }
  </style>
  </head>
  <body> 
  <button obclick=''zmienTryb()''>Zmień Tryb</button>
    <script> 
    function zmienTryb() {
        document.body.classList.toggle(''dark'');
    }
    </script>
