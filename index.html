<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moja Strona</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Witaj na mojej stronie 👋</h1>
    <p>Moje portfolio / blog</p>

    <button id="themeBtn">🌙 Zmień tryb</button>
  </header>

  <main>

    <section class="sekcja-obrazka">
      <h2>Mój Obraz</h2>
      <img src=''https://picsum.photos/400/200'' alt=''Przykładowy obrazek''>
    </section>

      <textarea placeholder="Napisz coś o sobie..."></textarea>
    </section>

    <section class="card">
      <h2>🖼️ Galeria zdjęć</h2>

      <input type="file" id="imageUpload" multiple accept="image/*">

      <div class="gallery" id="gallery"></div>
    </section>

    <section class=''sekcja-tabeli''>
      <h2> Przykładowa tabela</h2>
      <Tabele>
        <thread> 
          <tr> 
            <th>Lp.</th>
            <th>Nazwa Projekt</th>
            <th>status</th>
          </tr>
        </thread>
       <tbody>
      <tr>
          <td>1.</td>
          <td>Strona o mnie</td>
          <td>W trakcie</td>
      </tr>
      <tr>
          <td>2.</td>
          <td>Portfolio</td>
          <td>Planowanie</td> 
         </tr>
        </tbody>
       </Tabele>
    </section>
      
        
    <section class="card">
      <h2>📞 Kontakt</h2>

      <p>Email: lena@example.com</p>
      <p>Instagram: @lena</p>
    </section>

  </main>

  <footer>
    © 2026 Moja Strona
  </footer>

  <script src="script.js"></script>
</body>
</html>
